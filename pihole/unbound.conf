server:
    verbosity: 0
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-udp: yes
    do-tcp: yes

    # Security
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-referral-path: yes
    use-caps-for-id: no

    # Performance
    num-threads: 2
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4
    msg-cache-size: 64m
    rrset-cache-size: 128m

    # Logging — minimal (a healthy system is silent)
    log-queries: no
    log-replies: no
    logfile: ""
    val-log-level: 0

    # Access
    access-control: 0.0.0.0/0 allow

    # Prefetch popular domains
    prefetch: yes
    prefetch-key: yes

# Forward to DNS-over-TLS upstream (private, encrypted)
# When k3s arrives: switch to recursive with root hints
forward-zone:
    name: "."
    forward-addr: 9.9.9.9@853       # Quad9 — malware blocking + DNSSEC
    forward-addr: 149.112.112.112@853 # Quad9 secondary
    forward-addr: 1.1.1.1@853        # Cloudflare fallback
    forward-tls-upstream: yes
