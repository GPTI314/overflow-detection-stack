version: "3.8"

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "127.0.0.1:8053:80/tcp"   # Admin UI on localhost only
    environment:
      TZ: "UTC"
      WEBPASSWORD: "${PIHOLE_PASSWORD}"
      PIHOLE_DNS_: "unbound#5335"   # Forward to Unbound
      DNSSEC: "true"
      REV_SERVER: "false"
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq:/etc/dnsmasq.d
    networks:
      - dns
    depends_on:
      - unbound
    mem_limit: 256m

  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    volumes:
      - ./unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
    networks:
      - dns
    mem_limit: 256m

networks:
  dns:
    driver: bridge
